<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vietlott AI Picker</title>
<style>
body{
    margin:0;
    font-family:Arial,sans-serif;
    background:linear-gradient(135deg,#4f46e5,#9333ea,#ec4899);
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
}
.card{
    width:90%;
    max-width:800px;
    background:white;
    border-radius:24px;
    padding:30px;
    text-align:center;
    box-shadow:0 15px 40px rgba(0,0,0,.25);
}
h1{margin-top:0}
select,button{
    padding:12px 18px;
    font-size:18px;
    border-radius:12px;
    border:none;
}
button{
    cursor:pointer;
    background:#4f46e5;
    color:white;
    font-weight:bold;
    margin-left:10px;
}
#balls{
    margin-top:30px;
    display:flex;
    justify-content:center;
    flex-wrap:wrap;
    gap:15px;
}
.ball{
    width:80px;
    height:80px;
    border-radius:50%;
    background:linear-gradient(135deg,#f59e0b,#ef4444);
    color:white;
    display:flex;
    justify-content:center;
    align-items:center;
    font-size:28px;
    font-weight:bold;
    box-shadow:0 5px 15px rgba(0,0,0,.25);
}
.note{
    color:#666;
    margin-top:10px;
}
</style>
</head>
<body>
<div class="card">
    <h1>🎯 Vietlott Number Picker</h1>
    <p>Chọn loại vé và nhấn START</p>

    <select id="game">
        <option value="45">Mega 6/45</option>
        <option value="55">Power 6/55</option>
    </select>

    <button onclick="startPick()">START</button>

    <div id="balls"></div>
    <div class="note">Sinh ngẫu nhiên 6 số không trùng nhau</div>
</div>

<script>
function randomSet(max){
    let nums=[];
    while(nums.length<6){
        let n=Math.floor(Math.random()*max)+1;
        if(!nums.includes(n)) nums.push(n);
    }
    nums.sort((a,b)=>a-b);
    return nums;
}

function startPick(){
    const max=parseInt(document.getElementById("game").value);
    const container=document.getElementById("balls");

    let count=0;

    const timer=setInterval(()=>{
        container.innerHTML="";
        for(let i=0;i<6;i++){
            const b=document.createElement("div");
            b.className="ball";
            b.textContent=Math.floor(Math.random()*max)+1;
            container.appendChild(b);
        }

        count++;
        if(count>=25){
            clearInterval(timer);

            const result=randomSet(max);
            container.innerHTML="";

            result.forEach(n=>{
                const b=document.createElement("div");
                b.className="ball";
                b.textContent=String(n).padStart(2,"0");
                container.appendChild(b);
            });
        }
    },120);
}
</script>
</body>
</html>
